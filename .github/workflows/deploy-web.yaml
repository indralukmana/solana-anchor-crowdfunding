name: Deploy web to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/crowdfunding-sdk/**"
      - "pnpm-lock.yaml"
  pull_request:
    paths:
      - "apps/web/**"
      - "packages/crowdfunding-sdk/**"
      - "pnpm-lock.yaml"

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @crowdfunding/web... build

      - name: Deploy to Cloudflare Pages
        run: pnpm dlx wrangler pages deploy apps/web/dist --project-name=crowdfunding-web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}